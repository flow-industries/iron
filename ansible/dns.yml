---
- name: Configure Cloudflare DNS records
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Set A records from host domains
      community.general.cloudflare_dns:
        zone: "{{ item.1.zone }}"
        record: "{{ item.1.host }}"
        type: A
        value: "{{ hostvars[item.0]['ansible_host'] }}"
        api_token: "{{ cloudflare_api_token }}"
        proxied: "{{ item.1.proxied | default(true) }}"
        state: present
      loop: "{{ groups['all'] | subelements('domains', skip_missing=true) }}"
      loop_control:
        label: "{{ item.1.host }}"
