---
- name: Deploy stacks
  hosts: all
  become: true
  tasks:
    # --- Base setup ---
    - name: Create base deploy directory
      ansible.builtin.file:
        path: "{{ deploy_dir }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0755"

    - name: Create Docker network
      community.docker.docker_network:
        name: flow

    - name: Create stack directories
      ansible.builtin.file:
        path: "{{ deploy_dir }}/{{ item }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0755"
      loop: "{{ stacks + ['caddy', 'wud'] }}"

    # --- Migration: remove old watchtower ---
    - name: Stop old watchtower
      community.docker.docker_compose_v2:
        project_src: "{{ deploy_dir }}/watchtower"
        state: absent
      register: watchtower_stop
      failed_when:
        - watchtower_stop.failed
        - "'not found' not in (watchtower_stop.msg | default(''))"
        - "'does not exist' not in (watchtower_stop.msg | default(''))"

    # --- WUD (always) ---
    - name: Template WUD .env
      ansible.builtin.template:
        src: ../stacks/wud/.env.j2
        dest: "{{ deploy_dir }}/wud/.env"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0600"
      notify: Restart wud

    - name: Copy WUD compose
      ansible.builtin.copy:
        src: ../stacks/wud/docker-compose.yml
        dest: "{{ deploy_dir }}/wud/docker-compose.yml"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0644"
      notify: Restart wud

    - name: Copy rollout script
      ansible.builtin.copy:
        src: ../stacks/wud/rollout.sh
        dest: "{{ deploy_dir }}/wud/rollout.sh"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0755"
      notify: Restart wud

    - name: Start WUD
      community.docker.docker_compose_v2:
        project_src: "{{ deploy_dir }}/wud"
        pull: always
        state: present

    # --- Caddy (when domains defined) ---
    - name: Template Caddyfile
      ansible.builtin.template:
        src: ../stacks/caddy/Caddyfile.j2
        dest: "{{ deploy_dir }}/caddy/Caddyfile"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0644"
      when: domains is defined
      notify: Restart caddy

    - name: Copy caddy compose
      ansible.builtin.copy:
        src: ../stacks/caddy/docker-compose.yml
        dest: "{{ deploy_dir }}/caddy/docker-compose.yml"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0644"
      when: domains is defined
      notify: Restart caddy

    - name: Start caddy
      community.docker.docker_compose_v2:
        project_src: "{{ deploy_dir }}/caddy"
        pull: always
        state: present
      when: domains is defined

    # --- Site ---
    - name: Copy site compose
      ansible.builtin.copy:
        src: ../stacks/site/docker-compose.yml
        dest: "{{ deploy_dir }}/site/docker-compose.yml"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0644"
      when: "'site' in stacks"
      notify: Restart site

    - name: Start site
      community.docker.docker_compose_v2:
        project_src: "{{ deploy_dir }}/site"
        pull: always
        state: present
      when: "'site' in stacks"

    # --- Auth ---
    - name: Template auth .env
      ansible.builtin.template:
        src: ../stacks/auth/.env.j2
        dest: "{{ deploy_dir }}/auth/.env"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0600"
      when: "'auth' in stacks"
      notify: Restart auth

    - name: Copy auth compose
      ansible.builtin.copy:
        src: ../stacks/auth/docker-compose.yml
        dest: "{{ deploy_dir }}/auth/docker-compose.yml"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0644"
      when: "'auth' in stacks"
      notify: Restart auth

    - name: Create auth backup directory
      ansible.builtin.file:
        path: "{{ deploy_dir }}/auth/backups"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0755"
      when: "'auth' in stacks"

    - name: Start auth
      community.docker.docker_compose_v2:
        project_src: "{{ deploy_dir }}/auth"
        pull: always
        state: present
      when: "'auth' in stacks"

    # --- Talk ---
    - name: Copy talk compose
      ansible.builtin.copy:
        src: ../stacks/talk/docker-compose.yml
        dest: "{{ deploy_dir }}/talk/docker-compose.yml"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0644"
      when: "'talk' in stacks"
      notify: Restart talk

    - name: Start talk
      community.docker.docker_compose_v2:
        project_src: "{{ deploy_dir }}/talk"
        pull: always
        state: present
      when: "'talk' in stacks"

    # --- Game ---
    - name: Template game compose
      ansible.builtin.template:
        src: ../stacks/game/docker-compose.yml.j2
        dest: "{{ deploy_dir }}/game/docker-compose.yml"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0644"
      when: "'game' in stacks"
      notify: Restart game

    - name: Start game
      community.docker.docker_compose_v2:
        project_src: "{{ deploy_dir }}/game"
        pull: always
        state: present
      when: "'game' in stacks"

  handlers:
    - name: Restart caddy
      community.docker.docker_compose_v2:
        project_src: "{{ deploy_dir }}/caddy"
        state: restarted

    - name: Restart site
      community.docker.docker_compose_v2:
        project_src: "{{ deploy_dir }}/site"
        state: restarted

    - name: Restart auth
      community.docker.docker_compose_v2:
        project_src: "{{ deploy_dir }}/auth"
        state: restarted

    - name: Restart talk
      community.docker.docker_compose_v2:
        project_src: "{{ deploy_dir }}/talk"
        state: restarted

    - name: Restart game
      community.docker.docker_compose_v2:
        project_src: "{{ deploy_dir }}/game"
        state: restarted

    - name: Restart wud
      community.docker.docker_compose_v2:
        project_src: "{{ deploy_dir }}/wud"
        state: restarted
