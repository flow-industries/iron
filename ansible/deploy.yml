---
- name: Deploy web stack
  hosts: web
  become: true
  tasks:
    - name: Create deploy directory
      ansible.builtin.file:
        path: "{{ deploy_dir }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"

    - name: Template .env file
      ansible.builtin.template:
        src: ../templates/env.web.j2
        dest: "{{ deploy_dir }}/.env"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0600"
      notify: restart web stack

    - name: Copy Caddyfile
      ansible.builtin.template:
        src: ../templates/Caddyfile.web.j2
        dest: "{{ deploy_dir }}/Caddyfile"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
      notify: restart web stack

    - name: Copy web compose file
      ansible.builtin.copy:
        src: ../compose/web.yml
        dest: "{{ deploy_dir }}/docker-compose.yml"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
      notify: restart web stack

    - name: Start web stack
      community.docker.docker_compose_v2:
        project_src: "{{ deploy_dir }}"
        pull: always
        state: present

  handlers:
    - name: restart web stack
      community.docker.docker_compose_v2:
        project_src: "{{ deploy_dir }}"
        state: restarted

