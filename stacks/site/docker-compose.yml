services:
  site:
    image: ghcr.io/flow-industries/site:latest
    restart: always
    networks:
      - flow
    labels:
      - "wud.watch=true"
      - "wud.watch.digest=true"
      - "wud.trigger.include=rollout"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  flow:
    external: true
