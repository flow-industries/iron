services:
  auth:
    image: ghcr.io/flow-industries/auth:latest
    environment:
      DATABASE_URL: postgresql://flow:${DB_PASSWORD}@postgres:5432/flow_auth
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_SIWE_DOMAIN: ${BETTER_AUTH_SIWE_DOMAIN}
      PASSKEY_RP_ID: ${PASSKEY_RP_ID}
      PASSKEY_RP_NAME: ${PASSKEY_RP_NAME}
      NODE_ENV: production
    restart: always
    networks:
      - flow
    labels:
      - "wud.watch=true"
      - "wud.watch.digest=true"
      - "wud.trigger.include=rollout"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    labels:
      - "wud.watch=false"
    environment:
      POSTGRES_USER: flow
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: flow_auth
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    networks:
      - flow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flow -d flow_auth"]
      interval: 5s
      timeout: 5s
      retries: 5

  backup:
    image: prodrigestivill/postgres-backup-local
    labels:
      - "wud.watch=false"
    restart: always
    volumes:
      - ./backups:/backups
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: flow_auth
      POSTGRES_USER: flow
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    depends_on:
      postgres:
        condition: service_healthy

networks:
  flow:
    external: true

volumes:
  pgdata:
