domain = "flow.industries"

[servers.flow-1]
host = "flow-1.flow.industries"
user = "deploy"

[servers.game-1]
host = "game-1.flow.industries"
user = "deploy"

# Marketing / landing page
[apps.site]
image = "ghcr.io/flow-industries/site:latest"
servers = ["flow-1"]
port = 3000

[apps.site.routing]
routes = ["flow.industries"]
health_path = "/health"
health_interval = "5s"

# Auth + identity service
[apps.auth]
image = "ghcr.io/flow-industries/auth:latest"
servers = ["flow-1"]
port = 3000

[apps.auth.routing]
routes = ["id.flow.industries"]
health_path = "/health"

[[apps.auth.services]]
name = "postgres"
image = "postgres:17"
volumes = ["pgdata:/var/lib/postgresql/data"]
healthcheck = "pg_isready -U flow -d flow_auth"

[[apps.auth.services]]
name = "backup"
image = "prodrigestivill/postgres-backup-local"
volumes = ["./backups:/backups"]
depends_on = "postgres"

# Decentralized social
[apps.talk]
image = "ghcr.io/flow-industries/talk:latest"
servers = ["flow-1"]
port = 3000

[apps.talk.routing]
routes = ["flow.talk"]
health_path = "/health"

# Game web interface
[apps.game-web]
image = "ghcr.io/flow-industries/game-web:latest"
servers = ["game-1"]
port = 80

[apps.game-web.routing]
routes = ["flow.game"]
health_path = "/health"

# Multiplayer game server (direct TCP, no Caddy)
[apps.game-server]
image = "ghcr.io/flow-industries/game-server:latest"
servers = ["game-1"]
deploy_strategy = "recreate"

[[apps.game-server.ports]]
internal = 9999
external = 9999
protocol = "tcp"
